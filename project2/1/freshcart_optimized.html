<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshCart - Optimized</title>
  <link rel="stylesheet" href="styles.min.css">
</head>
<body>
  <!-- Header -->
  <header class="border-bottom bg-light py-1">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6 text-center text-md-start">
          <span>Super Value Deals - Save more with coupons</span>
        </div>
        <div class="col text-end d-none d-md-block">
          <span class="dropdown-toggle text-reset cursor-pointer">
            <img src="images/english.svg" alt="English" class="me-2">English
          </span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Navigation & Search -->
  <div class="py-5">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-3 col-6">
          <a class="navbar-brand" href="#"><img src="images/freshcart-logo.svg" alt="FreshCart"></a>
        </div>
        <div class="col-lg-6 d-none d-lg-block">
          <form>
            <div class="input-group">
              <input type="search" class="form-control rounded" placeholder="Search for products">
              <button type="button" class="btn btn-white border-start-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </button>
            </div>
          </form>
        </div>
        <div class="col-lg-3 d-none d-lg-block text-end">
          <button class="btn btn-outline-secondary">Login</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hero Section -->
  <main>
    <section class="mt-4">
      <div class="container">
        <div class="hero-section text-center p-5 bg-light rounded">
          <span class="badge bg-warning">Opening Sale Discount 50%</span>
          <h2 class="mt-4 fw-bold">SuperMarket For Fresh Grocery</h2>
          <p class="lead">New model for online grocery shopping and convenient home delivery.</p>
          <a href="#" class="btn btn-dark mt-3">Shop Now</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="mt-5 bg-light py-4">
    <div class="container text-center">
      <p class="mb-0">&copy; 2025 FreshCart. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="main.min.js" defer></script>
</body>
</html>
