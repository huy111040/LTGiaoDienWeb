<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="3.2.css">
</head>
<body>
<div class="section-sale">
    <div class="list-item-sale">
        <div class="countdown">
            <div class="box-countdown">
                <div class="box-deals-offers">
                    <div class="deals-offers">Deals and Offers</div>
                    <div class="hygiene">Hygiene equipments</div>
                </div>
                <div class="box-time">
                    <div class="group-time">
                        <div class="text-top">04</div>
                        <div class="text-bottom">Days</div>
                    </div>
                    <div class="group-time">
                        <div class="text-top">13</div>
                        <div class="text-bottom">Hour</div>
                    </div>
                    <div class="group-time">
                        <div class="text-top">34</div>
                        <div class="text-bottom">Min</div>
                    </div>
                    <div class="group-time">
                        <div class="text-top">56</div>
                        <div class="text-bottom">Sec</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="item">
            <img class="item-img" src="./image/img_1.png" alt="hình ảnh sản phẩm">
            <div class="item-name">Smart Watches</div>
            <div class="item-price">-25%</div>
        </div>
        <div class="item">
            <img class="item-img" src="./image/img_2.png" alt="hình ảnh sản phẩm">
            <div class="item-name">Laptops</div>
            <div class="item-price">-15%</div>
        </div>
        <div class="item">
            <img class="item-img" src="./image/img_3.png" alt="hình ảnh sản phẩm">
            <div class="item-name">Gopro Cameras</div>
            <div class="item-price">-40%</div>
        </div>
        <div class="item">
            <img class="item-img" src="./image/img_4.png" alt="hình ảnh sản phẩm">
            <div class="item-name">Headphones</div>
            <div class="item-price">-25%</div>
        </div>
        <div class="item">
            <img class="item-img" src="./image/img_3.png" alt="hình ảnh sản phẩm">
            <div class="item-name">Canon Camreras</div>
            <div class="item-price">-25%</div>
        </div>
        <div class="item">
            <img class="item-img" src="./image/img_5.png" alt="hình ảnh sản phẩm">
            <div class="item-name">Canon Camreras</div>
            <div class="item-price">-25%</div>
        </div>
    </div>
</div>
</body>
</html>
